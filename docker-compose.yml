version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tackle_assist_app
    ports:
      - "8081:8081"
    volumes:
      # ホスト側のディレクトリをコンテナの/appにマウント（リアルタイムで変更を反映）
      - ./:/app
      # コンテナ内のモジュールがホスト側のnode_modulesで上書きされないように、名前無しボリュームで保護する
      - /app/node_modules
    environment:
      # React Native/Expo 向けの設定
      - NODE_ENV=development
      - EXPO_USE_FAST_RESOLVER=true
      # Web用に立ち上げたい場合は以下を変更
      # command: npm run dev
    # ホスト側ネットワークからのアクセスを許可するために、バインドアドレスを指定することも可能です
    # command: npx expo start --lan
